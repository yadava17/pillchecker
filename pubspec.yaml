name: pillchecker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_local_notifications: ^20.0.0
  flutter_timezone: ^4.1.1
  timezone: ^0.10.1

  url_launcher: ^6.3.2

  rive: ^0.14.2

  cupertino_icons: ^1.0.8
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/pillchecker_logo.png
    - assets/images/pill_placeholder.png
    - assets/images/pill_splash_banner.png
    - assets/rive/pillbox.riv

  fonts:
    - family: Amaranth
      fonts:
        - asset: assets/fonts/Amaranth-Regular.ttf
          weight: 400
        - asset: assets/fonts/Amaranth-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Amaranth-Bold.ttf
          weight: 700
        - asset: assets/fonts/Amaranth-BoldItalic.ttf
          weight: 700
          style: italic
